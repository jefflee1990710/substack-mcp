<svg width="512" height="512" viewBox="0 0 512 512" fill="none" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="512" y2="512" gradientUnits="userSpaceOnUse">
      <stop stop-color="#03060D"/>
      <stop offset="1" stop-color="#060B16"/>
    </linearGradient>
    <linearGradient id="accent" x1="120" y1="360" x2="420" y2="150" gradientUnits="userSpaceOnUse">
      <stop stop-color="#0FB5CE"/>
      <stop offset="0.55" stop-color="#1FB585"/>
      <stop offset="1" stop-color="#6FB93B"/>
    </linearGradient>
    <linearGradient id="mono" x1="150" y1="180" x2="362" y2="300" gradientUnits="userSpaceOnUse">
      <stop stop-color="#FFFFFF"/>
      <stop offset="1" stop-color="#CFF7EC"/>
    </linearGradient>
  </defs>

  <!-- background (deep, near-black navy) -->
  <rect width="512" height="512" rx="116" fill="url(#bg)"/>
  <rect x="4" y="4" width="504" height="504" rx="112" fill="none" stroke="url(#accent)" stroke-opacity="0.28" stroke-width="2"/>

  <!-- faint grid -->
  <g stroke="#FFFFFF" stroke-opacity="0.035" stroke-width="1.5">
    <path d="M96 40V472M192 40V472M320 40V472M416 40V472"/>
    <path d="M40 96H472M40 192H472M40 320H472M40 416H472"/>
  </g>

  <!-- rising trend line + candlesticks (quant motif), muted so the wordmark leads -->
  <g opacity="0.7">
    <path d="M104 372 L168 336 L232 348 L296 268 L360 236 L416 168"
          fill="none" stroke="url(#accent)" stroke-width="6" stroke-linecap="round" stroke-linejoin="round"/>
    <g stroke="url(#accent)" stroke-width="5" stroke-linecap="round">
      <path d="M168 300V372"/><path d="M232 312V384"/><path d="M296 232V300"/><path d="M360 200V268"/>
    </g>
    <g fill="url(#accent)">
      <rect x="156" y="322" width="24" height="34" rx="5"/>
      <rect x="220" y="336" width="24" height="30" rx="5"/>
      <rect x="284" y="250" width="24" height="34" rx="5"/>
      <rect x="348" y="216" width="24" height="38" rx="5"/>
    </g>
  </g>

  <!-- SQT monogram (bright, high-contrast) -->
  <text x="256" y="248" text-anchor="middle"
        font-family="'Helvetica Neue', Arial, sans-serif" font-weight="800"
        font-size="150" letter-spacing="6" fill="url(#mono)">SQT</text>
  <text x="256" y="300" text-anchor="middle"
        font-family="'Helvetica Neue', Arial, sans-serif" font-weight="600"
        font-size="30" letter-spacing="14" fill="#7FA6BA">SOLO&#160;QUANT</text>
</svg>
